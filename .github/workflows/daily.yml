name: Daily Portfolio Update

on:
  schedule:
    # 09:00 KST = 00:00 UTC. 미국장 마감 후 (KST 06:00 / EST 16:00).
    - cron: '0 0 * * *'
    # 18:00 KST = 09:00 UTC. 한국장 마감(15:30) 후.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Nanum font
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run update_portfolio.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: python update_portfolio.py

      - name: Commit and push charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/
          if git diff --staged --quiet; then
            echo "No chart changes"
            exit 0
          fi
          git commit -m "chore: update portfolio charts $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "push failed after 5 attempts"
          exit 1
