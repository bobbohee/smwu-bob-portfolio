name: Daily Portfolio Update

on:
  schedule:
    # 매일 18:00 KST = 09:00 UTC. 장 마감(15:30 KST) 후 + 미국장 종가 일부 반영.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Nanum font
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run update_portfolio.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: python update_portfolio.py

      - name: Commit and push chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/pie.png
          if git diff --staged --quiet; then
            echo "No image changes"
          else
            git commit -m "chore: update pie chart $(date -u +%Y-%m-%d)"
            git push
          fi
