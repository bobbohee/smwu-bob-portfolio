name: Daily Portfolio Update

on:
  schedule:
    # 09:17 KST = 00:17 UTC. 정시 회피 (GitHub Actions cron delay 완화).
    - cron: '17 0 * * *'
    # 18:23 KST = 09:23 UTC.
    - cron: '23 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Nanum font
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Phase 1 — DB UPSERT + 차트 생성
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: python update_portfolio.py charts

      - name: Commit and push charts
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/
          if git diff --staged --quiet; then
            echo "No chart changes"
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: update portfolio charts $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "push failed after 5 attempts"
          exit 1

      - name: Phase 2 — Notion 페이지 patch (new SHA로 jsdelivr pin)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
          GH_SHA:    ${{ steps.commit.outputs.sha }}
        run: python update_portfolio.py notion
